<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>냉이랑 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg2:#F4F5F7;--bg3:#e8e8e8;
  --text:#111;--text2:#444;--text3:#888;--text4:#ccc;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --c1:#F6753E;--c2:#F39CC9;--c3:#44B8FB;--c4:#9BBB97;
  --r:18px;--rs:14px;--rx:10px;
  --shadow:0 1px 6px rgba(0,0,0,0.07);
  --shadow-lg:0 4px 24px rgba(0,0,0,0.13);
  --tr:all 0.22s cubic-bezier(0.4,0,0.2,1);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;--text:#f0f0ec;--text2:#b0b0a8;--text3:#707068;--text4:#3a3a3a;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.16);--shadow:0 1px 6px rgba(0,0,0,0.3);--shadow-lg:0 4px 24px rgba(0,0,0,0.4);}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:120px;transition:background .4s ease}

/* HEADER */
.page-header{padding:20px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between}
.date-eye{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px}
.date-big{font-size:22px;font-weight:700;color:var(--text);line-height:1.2}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
.weight-chip{display:flex;align-items:baseline;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;cursor:pointer;transition:var(--tr)}
.weight-chip:hover,.weight-chip:focus{background:var(--bg3);outline:none}
.weight-chip:active{transform:scale(0.97)}
.wc-val{font-size:16px;font-weight:700;color:var(--text)}
.wc-unit{font-size:11px;color:var(--text3);font-weight:500}
.dtype-dropdown-wrap{position:relative;z-index:30}
.dtype-chip{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:5px 10px 5px 12px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;transition:var(--tr)}
.dtype-chip:hover,.dtype-chip:focus{background:var(--bg3);outline:none}
.dtype-chip:active{transform:scale(0.97)}
.dtype-chip svg{transition:transform .2s;flex-shrink:0}
.dtype-chip.open svg{transform:rotate(180deg)}
.dtype-menu{position:absolute;top:calc(100% + 4px);right:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rs);overflow:hidden;display:none;box-shadow:var(--shadow-lg);min-width:140px;z-index:40}
.dtype-menu.open{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dtype-item{padding:12px 14px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);transition:background .12s}
.dtype-item:last-child{border-bottom:none}
.dtype-item:hover{background:var(--bg2)}
.dtype-item.selected{color:var(--text);font-weight:600}
.dtype-check{color:var(--text);opacity:0;font-size:12px}
.dtype-item.selected .dtype-check{opacity:1}

/* PROGRESS RING */
.progress-row{display:flex;align-items:center;gap:16px;padding:0 20px 14px}
.ring-wrap{position:relative;width:60px;height:60px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg);width:60px;height:60px}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:5}
.ring-fill{fill:none;stroke:var(--c4);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s cubic-bezier(0.4,0,0.2,1)}
.ring-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text)}
.progress-meta{flex:1}
.progress-title{font-size:12px;font-weight:500;color:var(--text3);margin-bottom:3px}
.progress-sub{font-size:13px;font-weight:600;color:var(--text)}

/* CALORIE BAR */
.cal-bar-wrap{padding:0 20px 16px}
.cal-bar-card{background:var(--bg2);border-radius:var(--rs);padding:12px 14px;border:1px solid var(--border)}
.cal-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.cal-bar-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.cal-bar-nums{display:flex;align-items:baseline;gap:3px}
.cal-bar-current{font-size:20px;font-weight:700;color:var(--text);transition:color .3s}
.cal-bar-sep{font-size:13px;color:var(--text4)}
.cal-bar-max{font-size:13px;font-weight:500;color:var(--text3)}
.cal-bar-unit{font-size:11px;color:var(--text3);margin-left:1px}
.cal-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:6px}
.cal-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(0.4,0,0.2,1),background .3s;background:var(--c4)}
.cal-fill.over{background:var(--c1)}
.cal-detail{display:flex;gap:10px;flex-wrap:wrap}
.cal-detail-item{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.cal-detail-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* KCAL BADGE */
.kcal-tag{font-size:10px;font-weight:500;color:var(--text3);flex-shrink:0;background:var(--bg2);border-radius:99px;padding:1px 6px;margin-left:2px;border:1px solid var(--border)}

/* FRIDAY SPECIAL */
.friday-item .todo-title{color:#c44b12;font-weight:600}
.friday-item .todo-badge{background:#FEF0E8 !important;color:#C44B12 !important}

/* TODO CARD */
.todo-card{margin:0 16px;background:#fff;border:1px solid var(--border);border-radius:32px;box-shadow:var(--shadow);overflow:visible}

/* TIME TABS — pill */
.time-tabs-wrap{
  padding:10px 12px;border-bottom:1px solid var(--border);
  background:#fff;border-radius:32px 32px 0 0;
  position:sticky;top:0;z-index:20;
  transition:box-shadow .2s;
}
.time-tabs-wrap.stuck{box-shadow:0 2px 12px rgba(0,0,0,0.08)}
.time-tabs{display:flex;gap:6px;background:var(--bg2);border-radius:99px;padding:4px}
.time-tab{flex:1;padding:7px 0;font-size:12px;font-weight:500;color:var(--text3);background:none;border:none;cursor:pointer;font-family:inherit;border-radius:99px;transition:var(--tr);white-space:nowrap}
.time-tab.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.10)}
.time-tab:hover:not(.active){color:var(--text2)}

/* TODO SECTIONS */
.todo-sections{padding:0}
.time-section{padding:0}
.time-section-anchor{display:block;height:0}
.time-section-header{display:flex;align-items:center;padding:12px 16px 8px;font-size:14px;font-weight:600;color:var(--text2)}
.time-section-header::after{content:'';flex:1;height:1px;background:var(--border);margin-left:10px}

/* TODO ROW */
.todo-list{padding:0 12px 8px;display:flex;flex-direction:column;gap:0}
.todo-row{display:flex;align-items:flex-start;gap:0;padding:10px 4px;border-bottom:1px solid var(--border);transition:var(--tr)}
.todo-row:last-child{border-bottom:none}
.todo-row.disabled{opacity:0.42;pointer-events:none}
.todo-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:var(--tr);background:#fff;margin-top:1px;cursor:pointer;margin-right:10px}
.todo-check:hover{border-color:var(--text3)}
.todo-check:focus{outline:2px solid var(--c4);outline-offset:2px}
.todo-row.checked .todo-check{background:var(--text);border-color:var(--text)}
.check-svg{opacity:0;transform:scale(.4);transition:var(--tr);color:#fff}
.todo-row.checked .check-svg{opacity:1;transform:scale(1)}
.todo-body{flex:1;min-width:0}
.todo-top-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap}
.todo-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:var(--tr);flex-shrink:0}
.todo-badge:hover{filter:brightness(0.93)}
.todo-badge:focus{outline:2px solid var(--border2);outline-offset:1px}
.todo-badge.no-action{cursor:default;pointer-events:none}
.todo-time-inline{font-size:11px;font-weight:500;color:var(--text3);flex-shrink:0}
.todo-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.35;transition:color .2s;cursor:pointer}
.todo-row.checked .todo-title{color:var(--text3);text-decoration:line-through;text-decoration-color:var(--text3)}
.todo-sub{font-size:12px;color:var(--text3);margin-top:2px;line-height:1.4}
.free-meal-row{display:flex;align-items:center;gap:6px;margin-top:5px}
.free-meal-input{flex:1;font-size:13px;color:var(--text);background:var(--bg2);border:1px solid var(--border);border-radius:var(--rx);padding:5px 9px;font-family:inherit;outline:none;transition:var(--tr)}
.free-meal-input:focus{border-color:var(--text)}
.free-meal-input::placeholder{color:var(--text4)}
.todo-memo-inline{display:flex;align-items:flex-start;gap:4px;font-size:12px;color:var(--text2);margin-top:4px;line-height:1.45;cursor:pointer}
.todo-memo-inline:hover{color:var(--text)}
.todo-thumb-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.todo-thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;cursor:pointer;border:1px solid var(--border);transition:var(--tr)}
.todo-thumb:hover{transform:scale(1.06)}
.todo-actions{display:flex;flex-direction:row;align-items:center;gap:0;flex-shrink:0;margin-left:4px}
.act-btn{width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text4);transition:var(--tr);padding:0;flex-shrink:0}
.act-btn:hover{background:var(--bg2);color:var(--text3)}
.act-btn:focus{outline:2px solid var(--border2);outline-offset:1px}
.act-btn:active{transform:scale(0.88)}
.card-add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 16px;background:none;border:none;border-top:1px solid var(--border);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;width:100%;font-family:inherit;transition:var(--tr);border-radius:0 0 32px 32px}
.card-add-btn:hover{color:var(--text);background:var(--bg2)}
.card-add-btn:focus{outline:2px solid var(--border2)}

/* CALENDAR */
.cal-section{margin:16px 16px 0;background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.cal-header{padding:14px 16px 0}
.cal-month-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month-trigger{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;transition:var(--tr);border-radius:10px;padding:2px 4px}
.cal-month-trigger:hover{background:var(--bg2)}
.cal-month-big{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.cal-month-chevron{width:18px;height:18px;display:flex;align-items:center;justify-content:center;transition:transform .22s cubic-bezier(0.4,0,0.2,1);color:var(--text3)}
.cal-month-chevron.open{transform:rotate(180deg)}
.dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:2px}
.dow-label{font-size:10px;font-weight:600;color:var(--text3);text-align:center;padding-bottom:3px}
.dow-label.sun{color:var(--c1)}
.week-strip-row{display:grid;grid-template-columns:repeat(7,1fr)}
.full-month-grid{display:grid;grid-template-columns:repeat(7,1fr);overflow:hidden;max-height:0;transition:max-height .32s cubic-bezier(0.4,0,0.2,1)}
.full-month-grid.open{max-height:400px}
.cal-day{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:3px 0;transition:var(--tr)}
.cal-day:hover .cal-day-num{background:var(--bg2)}
.cal-day-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--text3);transition:var(--tr)}
.cal-day.today .cal-day-num{border:1.5px solid var(--text3);color:var(--text3)}
.cal-day.selected .cal-day-num{background:var(--text);color:#fff;border:none}
.cal-day.other-month .cal-day-num{color:var(--text4)}
.cal-day-dot{width:4px;height:4px;border-radius:50%;background:var(--c4);margin-top:2px;opacity:0;transition:opacity .2s}
.cal-day.has-data .cal-day-dot{opacity:1}
.cal-day.all-done-day .cal-day-dot{background:#1253ED}
.cal-expand-btn{display:flex;align-items:center;justify-content:center;padding:9px 0 11px;cursor:pointer;transition:var(--tr)}
.cal-expand-btn:hover{background:var(--bg2)}
.cal-expand-btn svg{color:var(--text4);transition:transform .22s cubic-bezier(0.4,0,0.2,1)}
.cal-expand-btn.open svg{transform:rotate(180deg)}

/* REPORT FAB */
.report-fab{position:fixed;bottom:28px;right:calc(50% - 215px + 20px);width:46px;height:46px;border-radius:50%;background:var(--text);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);z-index:50;transition:var(--tr)}
.report-fab:hover{transform:scale(1.08)}
.report-fab:focus{outline:3px solid var(--c4);outline-offset:2px}
.report-fab:active{transform:scale(0.94)}
@media(max-width:430px){.report-fab{right:20px}}

/* CONFETTI */
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:500;display:none}

/* SUCCESS */
.success-msg{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:510;pointer-events:none}
.success-msg.show{display:flex;animation:successPop .35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes successPop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
.success-bubble{background:#fff;border-radius:24px;padding:24px 36px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.success-bubble .s-text{font-size:18px;font-weight:700;color:var(--text)}

/* ── COMMON BOTTOM SHEET ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.46);z-index:200;align-items:flex-end;justify-content:center}
.overlay.open{display:flex;animation:overlayIn .18s ease}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes sheetIn{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Sheet base */
.sheet-wrap{
  background:#fff;border-radius:22px 22px 0 0;
  width:100%;max-width:430px;
  max-height:80vh;
  display:flex;flex-direction:column;
  animation:sheetIn .22s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
.sheet-fixed{
  padding:16px 20px 12px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:0 auto 14px}
.sheet-title{font-size:17px;font-weight:700;color:var(--text)}
.sheet-scroll{
  flex:1;overflow-y:auto;padding:16px 20px;
  scrollbar-width:thin;scrollbar-color:var(--border2) transparent;
}
.sheet-scroll::-webkit-scrollbar{width:4px}
.sheet-scroll::-webkit-scrollbar-track{background:transparent}
.sheet-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.sheet-footer{padding:12px 20px 36px;flex-shrink:0;border-top:1px solid var(--border)}

/* form elements */
.input-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px;margin-top:14px}
.input-label:first-child{margin-top:0}
.sheet-input{width:100%;font-size:15px;font-weight:500;color:var(--text);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:12px 14px;font-family:inherit;outline:none;-webkit-appearance:none;transition:var(--tr)}
.sheet-input:hover{border-color:var(--text3)}
.sheet-input:focus{border-color:var(--text)}
.sheet-input.big{font-size:28px;font-weight:700;text-align:center}
.sheet-textarea{width:100%;font-size:14px;color:var(--text);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:12px 14px;font-family:inherit;outline:none;-webkit-appearance:none;resize:none;min-height:80px;line-height:1.6;transition:var(--tr)}
.sheet-textarea:hover{border-color:var(--text3)}
.sheet-textarea:focus{border-color:var(--text)}
.time-select{width:100%;font-size:15px;font-weight:500;color:var(--text);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rs);padding:12px 14px;font-family:inherit;outline:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23888' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 14px center;transition:var(--tr)}
.time-select:hover{border-color:var(--text3)}
.sheet-btn{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--tr)}
.sheet-btn:hover{opacity:0.88}
.sheet-btn:active{transform:scale(0.98)}
.sheet-btn.secondary{background:var(--bg2);color:var(--text2)}
.sheet-btn.secondary:hover{background:var(--bg3)}
.sheet-btn+.sheet-btn{margin-top:8px}
.sheet-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}
.divider-line{height:1px;background:var(--border);margin:14px 0}

/* cat tabs (add sheet) */
.cat-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;border:1px solid var(--border2);background:#fff;color:var(--text3);cursor:pointer;font-family:inherit;white-space:nowrap;transition:var(--tr);flex-shrink:0}
.cat-tab:hover{background:var(--bg2)}
.cat-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.tmpl-panel{display:none}
.tmpl-panel.active{display:block}

/* catalog item row */
.catalog-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border);transition:var(--tr);margin-bottom:7px}
.catalog-item:last-child{margin-bottom:0}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.catalog-item-title{flex:1;font-size:13px;font-weight:500;color:var(--text);cursor:pointer}
.catalog-item-title:hover{color:var(--c3)}
.ci-edit-btn,.ci-del-btn{width:26px;height:26px;border-radius:50%;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:var(--tr);flex-shrink:0;padding:0}
.ci-edit-btn:hover{background:var(--bg3);color:var(--text)}
.ci-del-btn:hover{background:#fee;color:#c0392b}

/* badge picker */
.badge-picker-cat{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* memo */
.memo-item-title{font-size:13px;font-weight:600;color:var(--text);padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:14px}
.memo-img-preview{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}

/* img viewer */
.img-viewer-wrap{position:relative;width:100%;background:#000;border-radius:var(--rs);overflow:hidden;margin-bottom:12px}
.img-viewer-wrap img{width:100%;max-height:55vh;object-fit:contain;display:block}
.img-nav{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
.img-nav:hover{background:rgba(0,0,0,.75)}
.img-nav.prev{left:8px}
.img-nav.next{right:8px}
.img-counter{text-align:center;font-size:12px;color:var(--text3);margin-bottom:8px}

/* month picker */
.month-list{display:flex;flex-direction:column}
.month-list-item{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);font-size:16px;font-weight:500;color:var(--text);cursor:pointer;transition:var(--tr)}
.month-list-item:last-child{border-bottom:none}
.month-list-item:hover{color:var(--text2)}
.month-list-item.cur{font-weight:700}
.month-check{opacity:0;color:var(--text);font-size:14px}
.month-list-item.cur .month-check{opacity:1}

/* report */
.rpt-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);padding:16px;margin-bottom:10px}
.rpt-section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
.rpt-goal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rpt-goal-title{font-size:14px;font-weight:600;color:var(--text)}
.rpt-goal-sub{font-size:12px;color:var(--text3);margin-top:2px}
.rpt-goal-pct{font-size:24px;font-weight:700;color:var(--c4)}
.goal-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;margin-bottom:6px}
.goal-fill{height:100%;background:var(--c4);border-radius:99px;transition:width .5s cubic-bezier(0.4,0,0.2,1)}
.goal-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.streak-row{display:flex;gap:0}
.streak-item{flex:1;text-align:center;padding:4px 0}
.streak-val{font-size:28px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px}
.streak-lbl{font-size:11px;color:var(--text3);font-weight:500}
.streak-divider{width:1px;background:var(--border);margin:4px 0}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.stat-item{padding:14px;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.stat-item:nth-child(2n){border-right:none}
.stat-item:nth-child(n+3){border-bottom:none}
.stat-val{font-size:22px;font-weight:700;color:var(--text);line-height:1;margin-bottom:3px}
.stat-lbl{font-size:11px;color:var(--text3);font-weight:500}
.week-bars{display:flex;gap:4px;align-items:flex-end}
.wbar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.wbar-pct{font-size:9px;color:var(--text3);font-weight:500;height:12px;display:flex;align-items:flex-end}
.wbar-track{width:100%;height:52px;background:var(--bg3);border-radius:5px 5px 3px 3px;position:relative;overflow:hidden}
.wbar-fill{position:absolute;bottom:0;width:100%;border-radius:5px 5px 3px 3px;transition:height .5s cubic-bezier(0.4,0,0.2,1)}
.wbar-name{font-size:10px;color:var(--text3);font-weight:500}
.wt-log-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);font-size:13px}
.wt-log-item:last-child{border-bottom:none}
.wt-log-date{color:var(--text2)}
.diff-down{color:#2d7a4f;font-size:11px;font-weight:500;margin-left:4px}
.diff-up{color:#c0392b;font-size:11px;font-weight:500;margin-left:4px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:10px 20px;border-radius:99px;z-index:400;transition:transform .28s cubic-bezier(0.4,0,0.2,1);white-space:nowrap;font-family:inherit}
.toast.show{transform:translateX(-50%) translateY(0)}
.empty-state{text-align:center;padding:28px 20px;color:var(--text3);font-size:13px;line-height:1.9}
</style>
</head>
<body>

<!-- CALORIE BAR -->
<div class="cal-bar-wrap" id="cal-bar-wrap" style="display:none">

</div>

<div class="todo-card">

  <button class="card-add-btn" id="card-add-btn" onclick="openAddSheet()">

    항목 추가

</div>

<div class="cal-section">
  <div class="cal-header">
    <div class="cal-month-row">
      <div class="cal-month-trigger" onclick="openMonthPicker()" tabindex="0">
        <span class="cal-month-big" id="cal-month-label"></span>
        <span class="cal-month-chevron" id="cal-month-chevron">
          <svg width="10" height="7" viewBox="0 0 10 7" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
      </div>
    </div>
    <div class="dow-row" id="dow-labels"></div>

  <div class="cal-expand-btn" id="expand-btn" onclick="toggleCalExpand()">

  </div>
</div>

<button class="report-fab" onclick="openReportSheet()" aria-label="리포트">

</button>

<canvas id="confetti-canvas"></canvas>
<div class="success-msg" id="success-msg">

</div>

<!-- WEIGHT -->

<!-- ADD SHEET -->

    <div class="sheet-fixed">
      <div class="sheet-handle"></div>
      <div class="sheet-title">항목 추가</div>
      <div style="margin-top:12px">
        <div class="cat-tabs">
          <button class="cat-tab active" onclick="switchCatTab('meal',this)">식단</button>

</div>

<!-- EDIT CATALOG ITEM SHEET -->

</div>

<!-- IMG VIEWER -->

<!-- MONTH PICKER -->
<div class="overlay" id="month-picker-overlay" onclick="closeBg(event,'month-picker-overlay')">

    <div class="sheet-fixed">
      <div class="sheet-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="sheet-title" style="margin-bottom:0">월 선택</div>

<!-- REPORT -->

<!-- CONFIRM SHEET -->

<script>
/* ── CONSTANTS ── */
const DAYS=['일','월','화','수','목','금','토'];
const MONTHS_KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const FULL_DAYS=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const CAT_COLOR={meal:'#F6753E',exercise:'#F39CC9',supplement:'#44B8FB',life:'#9BBB97'};
const CAT_LABEL={meal:'식단',exercise:'운동',supplement:'보충제',life:'생활'};
const CAT_BG={meal:'#FEF0E8',exercise:'#FDE8F3',supplement:'#E6F5FE',life:'#EEF5ED'};
const CAT_TEXT={meal:'#C44B12',exercise:'#B0457A',supplement:'#1878B8',life:'#3D6E3A'};
const FREE_MEAL=['자유식'];
const DTYPE_LABEL={office:'출근 + 헬스',wfh:'재택 근무',weekend:'주말',holiday:'휴일'};

/* ── CALORIE MAP ── */
// keyed by title (lowercase trim). range → use midpoint. 0 = non-food
const KCAL={
  '아이스 아메리카노 + 감동란 + 두유': 180,
  '자유식': 700,           // 외식 평균
  '단체 외식': 700,
  '닭다리살 + 채소 + 메밀면': 430,
  '메밀면 + 닭다리살 + 쯔유': 420,
  '호밀빵 + 구운야채 + 크림카레': 520,
  '닭다리살 + 구운야채 + 쯔유': 350,
  '두부스테이크 + 구운야채 + 쯔유': 300,
  '더단백 드링크': 105,
  '마이프로틴 파우더': 100,
};
const KCAL_GOAL = 1494; // 권장섭취열량

function getKcal(title){
  return KCAL[title.trim()] || 0;
}
function fmtKcal(n){return n.toLocaleString()}

/* ── CATALOG (user-editable) ── */
function getCatalog(){
  return ls('catalog',{
    meal:[
      {id:'m1',title:'아이스 아메리카노 + 감동란 + 두유',sub:'무가당 국산약콩두유 1팩',time:'07:00'},
      {id:'m2',title:'자유식',sub:'',time:'12:00'},
      {id:'m3',title:'닭다리살 + 채소 + 메밀면',sub:'단백질 중심',time:'12:00'},
      {id:'m4',title:'메밀면 + 닭다리살 + 쯔유',sub:'저녁 메뉴 A',time:'19:00'},
      {id:'m5',title:'호밀빵 + 구운야채 + 크림카레',sub:'저녁 메뉴 B · 주 1회',time:'19:00'},
      {id:'m6',title:'닭다리살 + 구운야채 + 쯔유',sub:'저녁 메뉴 C',time:'19:00'},
      {id:'m7',title:'두부스테이크 + 구운야채 + 쯔유',sub:'저녁 메뉴 D',time:'19:00'},
    ],
    exercise:[
      {id:'e1',title:'헬스',sub:'근력 60분 + 유산소 20분 + 스트레칭 10분',time:'16:30'},
      {id:'e2',title:'러닝',sub:'주말 1회',time:'10:00'},
      {id:'e3',title:'PT',sub:'1주 1회',time:'10:00'},
      {id:'e4',title:'홈트',sub:'스쿼트 + 플랭크 + 힙힌지 15~20분',time:'10:00'},
      {id:'e5',title:'냉이 산책',sub:'강냉이랑',time:'종일'},
    ],
    supplement:[
      {id:'s1',title:'더단백 드링크',sub:'운동 직후 편의점 · 단백질 20g / 105kcal',time:'18:00'},
      {id:'s2',title:'마이프로틴 파우더',sub:'WPI 무향 · 물 300ml · 단백질 23g',time:'08:00'},
    ],
    life:[
      {id:'l1',title:'물 1.5L 이상 마시기',sub:'아메리카노 1잔 = 물 한 컵 추가',time:'종일'},
      {id:'l2',title:'11시 30분 전 취침',sub:'수면의 질 = 내일 식욕 컨트롤',time:'23:00'},
      {id:'l3',title:'음주 주 1회 제한',sub:'와인 or 위스키 1~2잔',time:'저녁'},
    ]
  });
}
function saveCatalog(c){lsSet('catalog',c)}

/* ── FRIDAY OVERRIDE ── */
// 금요일에는 음주 제한 투두 제거 + 오늘은 가능! 배너 노출
function applyFridayOverride(items, dow){
  if(dow !== 5) return items; // 금요일(5)만 적용
  return items
    .filter(i => i.title !== '음주 주 1회 제한')
    .concat([{id:'fri-cheers', cat:'life', title:'오늘은 가능!', sub:'주 1회 음주 허용일이에요. 즐거운 금요일', time:'저녁'}]);
}

/* ── UTILS ── */
function dateKey(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function pad(n){return String(n).padStart(2,'0')}
function todayKey(){return dateKey(new Date())}
function dayDiff(dk){
  const t=new Date();t.setHours(0,0,0,0);
  const p=dk.split('-').map(Number);const d=new Date(p[0],p[1]-1,p[2]);d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function isReadOnly(){const d=dayDiff(selDateKey);return d>0||d<=-2}

function ls(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb}catch{return fb}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{showToast('저장 공간이 부족해요')}}

function getDtype(dk){return ls('dtype_'+dk,null)}
function setDtype(dk,t){lsSet('dtype_'+dk,t)}
function effDtype(){
  const s=getDtype(selDateKey);if(s)return s;
  const dow=selDate.getDay();
  if(dow===0||dow===6)return'weekend';if(dow===1)return'wfh';return'office';
}
function getItems(dk,dtype){
  if(dayDiff(dk)>0){
    const d=JSON.parse(JSON.stringify(DEFAULT_ITEMS[dtype]||DEFAULT_ITEMS.office));
    const dow=new Date(dk.split('-').map(Number).reduce((acc,v,i)=>i===0?new Date(v,0,1):acc,null)||dk).getDay();
    return applyFridayOverride(d, new Date(dk.split('-')[0],dk.split('-')[1]-1,dk.split('-')[2]).getDay());
  }
  const s=ls('items_'+dk,null);if(s)return s;
  const d=JSON.parse(JSON.stringify(DEFAULT_ITEMS[dtype]||DEFAULT_ITEMS.office));
  d.forEach(i=>{if(!i.id)i.id=uid()});
  const dow=new Date(parseInt(dk.split('-')[0]),parseInt(dk.split('-')[1])-1,parseInt(dk.split('-')[2])).getDay();
  return applyFridayOverride(d, dow);
}
function saveItems(dk,items){if(dayDiff(dk)>0)return;lsSet('items_'+dk,items)}
function getChecks(dk){return ls('chk_'+dk,{})}
function saveChecks(dk,c){if(dayDiff(dk)>0)return;lsSet('chk_'+dk,c)}
function getMemos(dk){return ls('memos_'+dk,{})}
function saveMemos(dk,m){lsSet('memos_'+dk,m)}
function getImgs(dk){return ls('imgs_'+dk,{})}
function saveImgs(dk,imgs){lsSet('imgs_'+dk,imgs)}
function getFreeMeals(dk){return ls('freemeal_'+dk,{})}
function saveFreeMeals(dk,fm){lsSet('freemeal_'+dk,fm)}
function getAllRecords(){return ls('records',{})}
function saveRecord(dk,pct){if(dayDiff(dk)>0)return;const r=getAllRecords();r[dk]={pct};lsSet('records',r)}
function getWtHist(){return ls('wt_hist',[])}
function saveWtHist(a){lsSet('wt_hist',a.slice(-90))}
function curWt(){const h=getWtHist();return h.length?h[h.length-1].val:null}
function uid(){return Math.random().toString(36).slice(2,9)}
function timeToMin(t){
  if(!t||t==='종일')return-1;if(t==='저녁')return 9998;
  const m=t.match(/(\d+):(\d+)/);return m?parseInt(m[1])*60+parseInt(m[2]):9999;
}
function timeToSection(t){
  const m=timeToMin(t);
  if(m===-1)return'allday';
  if(m<720)return'morning';
  if(m<1140)return'afternoon';
  return'evening';
}
function isFreeMeal(title){return FREE_MEAL.includes(title)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function selectDayType(t){
  if(isReadOnly())return;
  document.getElementById('dtype-menu').classList.remove('open');
  document.getElementById('dtype-chip').classList.remove('open');

  const currentType=effDtype();
  if(t===currentType)return;

  const existingItems=ls('items_'+selDateKey,null);
  const existingChecks=getChecks(selDateKey);
  const hasData=existingItems!==null||Object.keys(existingChecks).length>0;

  function applyChange(){
    setDtype(selDateKey,t);
    const d=JSON.parse(JSON.stringify(DEFAULT_ITEMS[t]||DEFAULT_ITEMS.office));
    d.forEach(i=>{if(!i.id)i.id=uid()});
    const dow=new Date(parseInt(selDateKey.split('-')[0]),parseInt(selDateKey.split('-')[1])-1,parseInt(selDateKey.split('-')[2])).getDay();
    const finalItems=applyFridayOverride(d,dow);
    saveItems(selDateKey,finalItems);
    saveChecks(selDateKey,{});
    renderDropdown();renderTodos();
  }

  if(!hasData){
    applyChange();
  } else {
    openConfirmSheet(

      '지금까지 입력한 항목과 체크 기록이 모두 사라져요.',
      '변경할게요',
      '유지할게요',
      applyChange
    );
  }
}

/* ── RING + COMPLETION ── */
function updateRing(pct){
  const circ=2*Math.PI*25;
  document.getElementById('ring-fill').style.strokeDashoffset=circ-(pct/100)*circ;
  document.getElementById('ring-label').textContent=pct+'%';
  let sub='시작 전';
  if(pct>0&&pct<50)sub='진행 중';
  else if(pct>=50&&pct<100)sub='절반 넘었어요';
  else if(pct===100)sub='완료했어요';
  document.getElementById('progress-sub').textContent=sub;
  const nowComplete=(pct===100);
  if(nowComplete&&!wasComplete)triggerCompletion();
  else if(!nowComplete&&wasComplete)clearCompletion();
  wasComplete=nowComplete;
}
function triggerCompletion(){
  launchConfetti();
  const msg=document.getElementById('success-msg');
  msg.classList.add('show');
  setTimeout(()=>msg.classList.remove('show'),2000);
}
function clearCompletion(){}

/* ── CALORIE BAR ── */
function updateCalorieBar(items, checks){
  const checkedFood = items.filter(i=>checks[i.id] && getKcal(i.title)>0);
  const total = checkedFood.reduce((s,i)=>s+getKcal(i.title), 0);
  const wrap = document.getElementById('cal-bar-wrap');
  if(total===0){ wrap.style.display='none'; return; }
  wrap.style.display='block';
  const pct = Math.min(100, Math.round(total/KCAL_GOAL*100));
  const over = total > KCAL_GOAL;
  const cur = document.getElementById('cal-current');
  cur.textContent = fmtKcal(total);
  cur.style.color = over ? 'var(--c1)' : 'var(--text)';
  const fill = document.getElementById('cal-fill');
  fill.style.width = pct+'%';
  fill.classList.toggle('over', over);
  const colorMap={meal:'var(--c1)',supplement:'var(--c3)'};
  document.getElementById('cal-detail').innerHTML = checkedFood.map(i=>`
    <div class="cal-detail-item">
      <span class="cal-detail-dot" style="background:${colorMap[i.cat]||'var(--text3)'}"></span>
      <span>${i.title.length>12?i.title.slice(0,12)+'…':i.title}</span>
      <span style="font-weight:600;color:var(--text2)">${getKcal(i.title)}kcal</span>
    </div>`).join('');
}

/* ── CONFETTI ── */
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  canvas.style.display='block';
  const ctx=canvas.getContext('2d');
  const colors=['#F6753E','#F39CC9','#44B8FB','#9BBB97','#1253ED','#fbbf24','#f472b6'];
  const pieces=Array.from({length:140},()=>({
    x:Math.random()*canvas.width,y:-20-Math.random()*200,
    w:6+Math.random()*8,h:10+Math.random()*10,
    color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-0.5)*4,vy:2+Math.random()*4,
    angle:Math.random()*Math.PI*2,va:(Math.random()-0.5)*0.15,opacity:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.angle+=p.va;p.vy+=0.06;
      if(p.y<canvas.height+20)alive=true;
      if(frame>80)p.opacity=Math.max(0,p.opacity-0.012);
      ctx.save();ctx.globalAlpha=p.opacity;
      ctx.translate(p.x,p.y);ctx.rotate(p.angle);
      ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if(alive&&frame<200)requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  requestAnimationFrame(draw);
}

function renderTodos(){
  const dtype=effDtype();
  const items=getItems(selDateKey,dtype);
  const checks=getChecks(selDateKey);
  const memos=getMemos(selDateKey);
  const imgs=getImgs(selDateKey);
  const freeMeals=getFreeMeals(selDateKey);
  const ro=isReadOnly();

  const addBtn=document.getElementById('card-add-btn');
  addBtn.style.display=ro?'none':'flex';

  const allDay=items.filter(i=>!i.time||i.time==='종일');
  const timed=items.filter(i=>i.time&&i.time!=='종일').sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
  const morning=timed.filter(i=>timeToSection(i.time)==='morning');
  const afternoon=timed.filter(i=>timeToSection(i.time)==='afternoon');
  const evening=timed.filter(i=>timeToSection(i.time)==='evening');

  document.getElementById('tab-allday').style.display=allDay.length?'':'none';
  document.getElementById('tab-morning').style.display=morning.length?'':'none';
  document.getElementById('tab-afternoon').style.display=afternoon.length?'':'none';
  document.getElementById('tab-evening').style.display=evening.length?'':'none';

  let html='';
  if(allDay.length)  html+=buildSection('allday',null,allDay,checks,memos,imgs,freeMeals,ro);
  if(morning.length)   html+=buildSection('morning','오전',morning,checks,memos,imgs,freeMeals,ro);
  if(afternoon.length) html+=buildSection('afternoon','오후',afternoon,checks,memos,imgs,freeMeals,ro);
  if(evening.length)   html+=buildSection('evening','저녁',evening,checks,memos,imgs,freeMeals,ro);
  document.getElementById('todo-sections').innerHTML=html||'<div class="empty-state">항목이 없어요</div>';

  const done=items.filter(i=>checks[i.id]).length;
  updateRing(items.length?Math.round(done/items.length*100):0);
  updateCalorieBar(items, checks);
}

function toggleCheck(id){
  if(isReadOnly())return;
  const dtype=effDtype();const items=getItems(selDateKey,dtype);const checks=getChecks(selDateKey);
  checks[id]=!checks[id];saveChecks(selDateKey,checks);
  const el=document.getElementById('ti-'+id);if(el)el.classList.toggle('checked',!!checks[id]);
  const done=items.filter(i=>checks[i.id]).length;
  const pct=items.length?Math.round(done/items.length*100):0;

/* ── REPORT ── */
function openReportSheet(){renderReportContent();document.getElementById('report-overlay').classList.add('open')}
function renderReportContent(){
  const now=new Date();const dow=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));
  const weekDates=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d});
  const records=getAllRecords();let wkCI=0,wkSum=0,wkN=0;
  const barsHTML=weekDates.map(d=>{
    const dk=dateKey(d);const rec=records[dk];const pct=rec?rec.pct:0;
    if(rec){wkCI++;wkSum+=pct;wkN++}
    return`<div class="wbar-wrap">
      <div class="wbar-pct">${pct?pct+'%':''}</div>
      <div class="wbar-track"><div class="wbar-fill" style="height:${Math.round(pct*.52)}px;background:${pct===100?'#1253ED':'var(--c3)'}"></div></div>
      <div class="wbar-name">${DAYS[d.getDay()]}</div></div>`;
  }).join('');
  const wt=curWt();
  let goalHTML=`<div class="rpt-goal-sub" style="padding:4px 0">체중을 먼저 입력해주세요</div>`;
  if(wt){
    const lost=56-wt,range=56-45;const gpct=Math.min(100,Math.max(0,Math.round(lost/range*100)));
    goalHTML=`<div class="rpt-goal-head"><div><div class="rpt-goal-title">목표까지 남은 거리</div><div class="rpt-goal-sub">앞으로 ${(wt-45).toFixed(1)}kg</div></div><div class="rpt-goal-pct">${gpct}%</div></div>
    <div class="goal-track"><div class="goal-fill" style="width:${gpct}%"></div></div>
    <div class="goal-labels"><span>목표 45kg</span><span>현재 ${wt}kg</span></div>`;
  }
  const streak=calcStreak(records),best=calcBestStreak(records);
  const mKey=`${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  const mRecs=Object.entries(records).filter(([k])=>k.startsWith(mKey));
  const hist=getWtHist().slice(-8).reverse();
  const wtLog=!hist.length?`<div class="empty-state" style="padding:16px 0">체중 기록이 없어요</div>`
    :hist.map((e,i)=>{const prev=hist[i+1];let diff='';
      if(prev){const d=e.val-prev.val;if(d<0)diff=`<span class="diff-down">▼${Math.abs(d).toFixed(1)}</span>`;else if(d>0)diff=`<span class="diff-up">▲${d.toFixed(1)}</span>`}
      return`<div class="wt-log-item"><span class="wt-log-date">${e.date}</span><span style="font-weight:600">${e.val}kg${diff}</span></div>`;
    }).join('');
  document.getElementById('report-content').innerHTML=`
    <div class="rpt-card"><div class="streak-row">
      <div class="streak-item"><div class="streak-val">${streak}</div><div class="streak-lbl">연속 달성일</div></div>
      <div class="streak-divider"></div>
      <div class="streak-item"><div class="streak-val">${wkCI}</div><div class="streak-lbl">이번 주 체크인</div></div>
    </div></div>
    <div class="rpt-card"><div class="rpt-section-title">목표 체중</div>${goalHTML}</div>
    <div class="rpt-card"><div class="rpt-section-title">이번 주</div><div class="week-bars">${barsHTML}</div></div>
    <div class="rpt-card" style="padding:0;overflow:hidden"><div class="stats-grid">
      <div class="stat-item"><div class="stat-val">${wkN?Math.round(wkSum/wkN)+'%':'--%'}</div><div class="stat-lbl">주간 평균</div></div>
      <div class="stat-item"><div class="stat-val">${mRecs.length?Math.round(mRecs.reduce((s,[,r])=>s+r.pct,0)/mRecs.length)+'%':'--%'}</div><div class="stat-lbl">월간 평균</div></div>
      <div class="stat-item"><div class="stat-val">${Object.keys(records).length}</div><div class="stat-lbl">누적 체크인</div></div>
      <div class="stat-item"><div class="stat-val">${best}</div><div class="stat-lbl">최고 연속</div></div>
    </div></div>
    <div class="rpt-card"><div class="rpt-section-title">체중 기록</div>${wtLog}</div>`;
}
function calcStreak(r){let s=0;const d=new Date();while(true){const k=dateKey(d);if(!r[k]||r[k].pct<50)break;s++;d.setDate(d.getDate()-1)}return s}
function calcBestStreak(r){const keys=Object.keys(r).sort();let best=0,cur=0;for(let i=0;i<keys.length;i++){if(r[keys[i]].pct>=50){if(i>0){const diff=(new Date(keys[i])-new Date(keys[i-1]))/86400000;if(diff>1)cur=0}cur++;best=Math.max(best,cur);}else cur=0;}return best}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}

/* ── INIT ── */
buildCatalogUI();
renderHeader();
renderDropdown();
renderTodos();
renderCalHeader();

/* STICKY TAB — 30% threshold */
(function(){
  const wrap=document.getElementById('time-tabs-wrap');if(!wrap)return;
  const sentinel=document.createElement('div');
  sentinel.style.cssText='position:absolute;top:0;left:0;width:1px;height:1px;pointer-events:none';
  const todoCard=document.querySelector('.todo-card');
  if(todoCard)todoCard.style.position='relative';
  if(wrap.parentElement)wrap.parentElement.insertBefore(sentinel,wrap);
  new IntersectionObserver(entries=>{
    entries.forEach(e=>wrap.classList.toggle('stuck',e.intersectionRatio<0.3));
  },{threshold:[0,0.3,1]}).observe(sentinel);
})();

/* INIT COMPLETION STATE */
(function(){
  const dtype=effDtype();const items=getItems(selDateKey,dtype);const checks=getChecks(selDateKey);
  const done=items.filter(i=>checks[i.id]).length;
  if(items.length&&done===items.length)wasComplete=true;
})();
</script>
